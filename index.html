<!doctype html>
<html lang="ko">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>시간표 검증기</title>
      <style>
         * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
         }
         body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: #f5f5f0;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 32px 24px;
         }
         h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: -0.3px;
         }
         .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
            min-width: 0;
         }
         .grid > div {
            min-width: 0;
         }
         label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
         }
         textarea,
         #editor {
            width: 100%;
            height: 220px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 12px;
            background: #fff;
            color: #1a1a1a;
            resize: vertical;
            outline: none;
            transition: border-color 0.15s;
         }
         textarea {
            font-family: 'Courier New', monospace;
         }
         #editor {
            overflow: auto;
            line-height: 1.5;
            cursor: text;
         }
         #editor table {
            white-space: nowrap;
         }
         textarea:focus,
         #editor:focus {
            border-color: #999;
         }
         #editor:empty::before {
            content: attr(data-placeholder);
            color: #bbb;
            pointer-events: none;
         }
         .btns {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
         }
         button {
            padding: 9px 22px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: -0.2px;
         }
         #btnRun {
            background: #1a1a1a;
            color: #fff;
            border: none;
         }
         #btnRun:hover {
            background: #333;
         }
         #btnClear {
            background: #fff;
            color: #666;
            border: 1px solid #ddd;
         }
         #btnClear:hover {
            background: #f5f5f0;
         }

         .summary {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 14px;
         }
         .s-ok {
            font-size: 13px;
            font-weight: 600;
            color: #16a34a;
         }
         .s-err {
            font-size: 13px;
            font-weight: 600;
            color: #dc2626;
         }
         .s-tot {
            font-size: 12px;
            color: #999;
         }

         .rows {
            display: flex;
            flex-direction: column;
            gap: 6px;
         }
         .row {
            padding: 10px 14px;
            border-radius: 10px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
         }
         .row.ok {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
         }
         .row.err {
            background: #fff5f5;
            border: 1px solid #fecaca;
         }
         .icon {
            font-size: 13px;
            margin-top: 1px;
            min-width: 14px;
         }
         .row.ok .icon {
            color: #16a34a;
         }
         .row.err .icon {
            color: #dc2626;
         }
         .row-body {
            flex: 1;
         }
         .row-head {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
         }
         .time {
            font-size: 13px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
         }
         .badge {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
         }
         .badge-NDT {
            background: #dbeafe;
            color: #1d4ed8;
         }
         .badge-FES {
            background: #bfdbfe;
            color: #1e3a8a;
         }
         .badge-Mat {
            background: #dcfce7;
            color: #166534;
         }
         .badge-Gait {
            background: #dcfce7;
            color: #166534;
         }
         .badge-도수치료 {
            background: #fef3c7;
            color: #92400e;
         }
         .badge-etc {
            background: #f3f4f6;
            color: #6b7280;
         }
         .names {
            font-size: 13px;
            color: #555;
         }
         .errs {
            margin-top: 5px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
         }
         .errs span {
            font-size: 12px;
            color: #dc2626;
         }

         @media (max-width: 600px) {
            .grid {
               grid-template-columns: 1fr;
            }
            body {
               padding: 20px 16px;
            }
         }
      </style>
   </head>
   <body>
      <h1>📋 시간표 검증기</h1>

      <div class="grid">
         <div>
            <label>① EMR 시간표 텍스트</label>
            <textarea id="sched" placeholder="EMR에서 복사한 탭 구분 시간표를 붙여넣으세요"></textarea>
         </div>
         <div>
            <label>② 액샐 표 붙여넣기</label>
            <div id="editor" contenteditable="true" data-placeholder="여기에 엑셀 표를 붙여넣으세요 (Ctrl+V)"></div>
         </div>
      </div>

      <div class="btns">
         <button id="btnRun">검증하기</button>
         <button id="btnClear">초기화</button>
      </div>

      <div id="results"></div>

      <script>
         let savedHtml = ''

         document.getElementById('editor').addEventListener('paste', (e) => {
            e.preventDefault()
            const h = e.clipboardData.getData('text/html')
            const t = e.clipboardData.getData('text/plain')
            savedHtml = h || t
            document.getElementById('editor').innerHTML = h || t
         })

         function parseSchedule(text) {
            const lines = text.trim().split('\n').filter(Boolean)
            const map = new Map(),
               order = []
            for (const line of lines) {
               const p = line.split('\t')
               if (p.length < 6) continue
               const [start, end, , name, , rawType] = p.map((s) => s.trim())
               const type = rawType.startsWith('도수치료') ? '도수치료' : rawType
               if (!map.has(start)) {
                  map.set(start, { start, names: [], entries: [] })
                  order.push(start)
               }
               map.get(start).names.push(name)
               map.get(start).entries.push({ name, end, type })
            }
            return order.map((k) => map.get(k))
         }

         function parseColorStr(s) {
            if (!s) return null
            s = s.trim()
            const m = s.match(/rgb\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/)
            if (m) return { r: +m[1], g: +m[2], b: +m[3] }
            if (s.startsWith('#')) {
               let h = s.slice(1)
               if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2]
               if (h.length === 6) return { r: parseInt(h.slice(0, 2), 16), g: parseInt(h.slice(2, 4), 16), b: parseInt(h.slice(4, 6), 16) }
            }
            const named = { blue: [0, 0, 255], cyan: [0, 255, 255], aqua: [0, 255, 255], teal: [0, 128, 128], lightblue: [173, 216, 230], skyblue: [135, 206, 235] }
            const c = named[s.toLowerCase().replace(/\s/g, '')]
            return c ? { r: c[0], g: c[1], b: c[2] } : null
         }

         function isBlueColor(c) {
            return c && c.b > 100 && c.b >= c.g - 30 && c.b > c.r + 20
         }

         function isBlueBg(el) {
            let cur = el
            while (cur && cur.tagName !== 'TABLE') {
               if (isBlueColor(parseColorStr((cur.style && cur.style.backgroundColor) || ''))) return true
               const bg = (cur.getAttribute && cur.getAttribute('bgcolor')) || ''
               if (bg && isBlueColor(parseColorStr(bg))) return true
               cur = cur.parentElement
            }
            return false
         }

         function parseTds(html) {
            const doc = new DOMParser().parseFromString(html, 'text/html')
            const rows = Array.from(doc.querySelectorAll('tr'))
            if (!rows.length) return []

            const numRows = rows.length
            const occupied = Array.from({ length: numRows }, () => new Set())
            const slots = new Map()

            for (let r = 0; r < numRows; r++) {
               const tds = Array.from(rows[r].querySelectorAll(':scope > td'))
               let col = 0
               for (const td of tds) {
                  while (occupied[r].has(col)) col++
                  const colspan = parseInt(td.getAttribute('colspan')) || 1
                  const rowspan = parseInt(td.getAttribute('rowspan')) || 1
                  for (let dr = 0; dr < rowspan && r + dr < numRows; dr++) for (let dc = 0; dc < colspan; dc++) occupied[r + dr].add(col + dc)
                  if (!slots.has(col)) slots.set(col, { texts: [], elements: [], isLabel: false, maxColspan: 0 })
                  if (rowspan > 1) slots.get(col).isLabel = true
                  if (colspan > slots.get(col).maxColspan) slots.get(col).maxColspan = colspan
                  const text = (td.textContent || '').replace(/[\s\u00A0]/g, '')
                  if (text) {
                     slots.get(col).texts.push(text)
                     slots.get(col).elements.push(td)
                  }
                  col += colspan
               }
            }

            return Array.from(slots.entries())
               .sort((a, b) => a[0] - b[0])
               .filter(([, slot]) => !slot.isLabel && slot.maxColspan >= 2)
               .map(([, slot]) =>
                  slot.texts.length > 0
                     ? {
                          text: slot.texts.join(''),
                          blue: slot.elements.some((el) => isBlueBg(el)),
                       }
                     : null
               )
         }

         const TIME_SLOTS = [
            { start: '08:30', end: '09:00', fesEnd: '08:50' },
            { start: '09:03', end: '09:33', fesEnd: '09:23' },
            { start: '09:36', end: '10:06', fesEnd: '09:56' },
            { start: '10:09', end: '10:39', fesEnd: '10:29' },
            { start: '10:42', end: '11:12', fesEnd: '11:02' },
            { start: '11:15', end: '11:45', fesEnd: '11:35' },
            { start: '11:48', end: '12:18', fesEnd: '12:08' },
            { start: '13:30', end: '14:00', fesEnd: '13:50' },
            { start: '14:03', end: '14:33', fesEnd: '14:23' },
            { start: '14:36', end: '15:06', fesEnd: '14:56' },
            { start: '15:09', end: '15:39', fesEnd: '15:29' },
            { start: '15:42', end: '16:12', fesEnd: '16:02' },
            { start: '16:15', end: '16:45', fesEnd: '16:35' },
            { start: '16:48', end: '17:18', fesEnd: '17:08' },
         ]

         function addMinutes(hhmm, mins) {
            const [h, m] = hhmm.split(':').map(Number)
            const total = h * 60 + m + mins
            return String(Math.floor(total / 60)).padStart(2, '0') + ':' + String(total % 60).padStart(2, '0')
         }

         function detectCellType(cell) {
            const text = cell.text
            if (/[가-힣\d]N/.test(text)) return 'NDT'
            if (/\(도\)/.test(text)) return '도수치료'
            const hasM = /[가-힣\d]M/.test(text)
            const hasG = /[가-힣\d]G/.test(text)
            if (hasM && hasG) return 'MatGait'
            if (hasM) return 'Mat'
            if (hasG) return 'Gait'
            if (cell.blue) return 'FES'
            return null
         }

         function nameInText(name, text) {
            if (text.includes(name)) return true
            const stripped = name.replace(/\d+$/, '')
            return stripped !== name && text.includes(stripped)
         }

         function verify(groups, cells) {
            // 왼쪽 그룹을 시작시간으로 인덱싱
            const groupByStart = new Map()
            for (const g of groups) {
               groupByStart.set(g.start, g)
            }

            const results = []
            const consumed = new Set()

            // 오른쪽 표의 각 칸(고정 슬롯) 기준으로 검증
            const slotCount = Math.max(cells.length, TIME_SLOTS.length)
            for (let i = 0; i < slotCount; i++) {
               if (consumed.has(i)) continue
               const slot = TIME_SLOTS[i]
               const cell = cells[i]
               if (!slot) break

               const g = groupByStart.get(slot.start)

               // 둘 다 비었으면 조용히 스킵 (미출근/조퇴 시간대)
               if (!cell && !g) continue

               // 표만 비었음 → EMR에 있는데 표 기록 없음
               if (!cell) {
                  results.push({ ...g, errors: ['표에 기록 없음'], ok: false })
                  groupByStart.delete(slot.start)
                  continue
               }

               const cellType = detectCellType(cell)

               // EMR에 해당 슬롯이 없음 → 빠뜨림
               if (!g) {
                  results.push({ start: slot.start, end: '', type: cellType || '?', names: [], errors: ['EMR에 ' + slot.start + ' 누락'], ok: false })
                  continue
               }

               // 매핑된 그룹 제거 (중복 방지)
               groupByStart.delete(slot.start)

               const errors = []

               const isMulti = g.entries.length > 1

               // 도수치료 연장 감지: 다음 칸(들) 텍스트에 같은 이름이 정확히(숫자포함) 있으면 연장
               // 1칸 연장 = 1시간(60분), 2칸 연장 = 90분
               let extraSlots = 0
               if (cellType === '도수치료' && g.entries.length === 1) {
                  const name = g.entries[0].name
                  const c1 = cells[i + 1]
                  const s1 = TIME_SLOTS[i + 1]
                  if (c1 && s1 && c1.text.includes(name)) {
                     extraSlots = 1
                     const c2 = cells[i + 2]
                     const s2 = TIME_SLOTS[i + 2]
                     if (c2 && s2 && c2.text.includes(name)) {
                        extraSlots = 2
                     }
                  }
                  for (let k = 1; k <= extraSlots; k++) consumed.add(i + k)
               }
               const isOneHour = extraSlots === 1
               const isNinety = extraSlots === 2

               // 1. 이름별 종료시간·치료종류 검증
               for (const entry of g.entries) {
                  // 이름이 표에 있는지 (숫자 유연 매칭)
                  if (!nameInText(entry.name, cell.text)) {
                     errors.push('"' + entry.name + '" 표에 없음')
                     continue
                  }

                  // 종료시간 검증 (도수치료는 30분/20분/1시간 허용)
                  if (cellType && slot) {
                     if (cellType === '도수치료') {
                        if (isOneHour || isNinety) {
                           const mins = isNinety ? 90 : 60
                           const expected = addMinutes(slot.start, mins)
                           if (entry.end !== expected) {
                              errors.push(entry.name + ' 종료시간: ' + entry.end + ' → 정답 ' + expected + ' (' + mins + '분)')
                           }
                        } else if (entry.end !== slot.end && entry.end !== slot.fesEnd) {
                           errors.push(entry.name + ' 종료시간: ' + entry.end + ' → 정답 ' + slot.end + ' 또는 ' + slot.fesEnd)
                        }
                     } else {
                        const expectedEnd = cellType === 'FES' ? slot.fesEnd : slot.end
                        if (entry.end !== expectedEnd) {
                           errors.push(entry.name + ' 종료시간: ' + entry.end + ' → 정답 ' + expectedEnd)
                        }
                     }
                  }

                  // 치료종류 검증
                  if (cellType) {
                     const ct = cellType
                     const et = entry.type

                     if (isMulti && (ct === 'Mat' || ct === 'Gait' || ct === 'MatGait')) {
                        // 여러 명 + M/G 칸: Mat/Gait면 통과, 그 외 오류
                        if (et !== 'Mat' && et !== 'Gait') {
                           errors.push(entry.name + ' 치료종류: ' + et + ' → 표는 Mat/Gait')
                        }
                     } else {
                        // 한 명이거나 NDT/FES/도수치료: 정확 일치
                        if (et !== ct) {
                           errors.push(entry.name + ' 치료종류: ' + et + ' → 표는 ' + ct)
                        }
                     }
                  }
               }

               // 2. 역방향 이름 검증 (표에 있는데 EMR에 없는 이름)
               let remaining = cell.text
               for (const name of g.names) {
                  if (remaining.includes(name)) {
                     remaining = remaining.replace(name, '')
                  } else {
                     const stripped = name.replace(/\d+$/, '')
                     if (stripped !== name) remaining = remaining.replace(stripped, '')
                  }
               }
               remaining = remaining.replace(/[NMG]|\(도\)/g, '')
               const unknown = remaining.match(/[가-힣]+\d*/g) || []
               for (const u of unknown) {
                  errors.push('"' + u + '" EMR에 없음')
               }

               results.push({ ...g, errors, ok: errors.length === 0 })
            }

            // 왼쪽에 있는데 어떤 슬롯에도 매핑 안 된 그룹
            for (const [start, g] of groupByStart) {
               results.push({ ...g, errors: ['시작시간 ' + start + '은 유효한 슬롯이 아닙니다'], ok: false })
            }

            return results
         }

         function badgeClass(t) {
            return ['NDT', 'FES', 'Mat', 'Gait', '도수치료'].includes(t) ? 'badge-' + t : 'badge-etc'
         }

         function render(results) {
            const ok = results.filter((r) => r.ok).length
            const err = results.filter((r) => !r.ok).length
            let html = '<div class="summary">' + '<span class="s-ok">정상 ' + ok + '개</span>' + (err > 0 ? '<span class="s-err">오류 ' + err + '개</span>' : '') + '<span class="s-tot">총 ' + results.length + '칸</span>' + '</div><div class="rows">'

            for (const r of results) {
               html +=
                  '<div class="row ' +
                  (r.ok ? 'ok' : 'err') +
                  '">' +
                  '<span class="icon">' +
                  (r.ok ? '✓' : '✗') +
                  '</span>' +
                  '<div class="row-body">' +
                  '<div class="row-head">' +
                  '<span class="time">' +
                  r.start +
                  '</span>' +
                  '<span class="badge ' +
                  badgeClass(r.entries && r.entries[0] ? r.entries[0].type : r.type || '?') +
                  '">' +
                  (r.entries && r.entries[0] ? r.entries[0].type : r.type || '?') +
                  '</span>' +
                  '<span class="names">' +
                  r.names.join(', ') +
                  '</span>' +
                  '</div>' +
                  (r.errors && r.errors.length > 0 ? '<div class="errs">' + r.errors.map((e) => '<span>• ' + e + '</span>').join('') + '</div>' : '') +
                  '</div></div>'
            }
            html += '</div>'
            document.getElementById('results').innerHTML = html
         }

         document.getElementById('btnRun').addEventListener('click', () => {
            const schedTxt = document.getElementById('sched').value
            const html = savedHtml || document.getElementById('editor').innerHTML
            if (!schedTxt.trim() || !html.trim()) {
               alert('양쪽 모두 입력해주세요.')
               return
            }
            const groups = parseSchedule(schedTxt)
            const cells = parseTds(html)
            render(verify(groups, cells))
         })

         document.getElementById('btnClear').addEventListener('click', () => {
            document.getElementById('sched').value = ''
            document.getElementById('editor').innerHTML = ''
            document.getElementById('results').innerHTML = ''
            savedHtml = ''
         })
      </script>
   </body>
</html>
